name: Build DMG

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Swift version
        run: swift --version

      - name: Build DMG
        run: ./scripts/build-dmg.sh

      - name: Upload DMG
        uses: actions/upload-artifact@v7
        with:
          name: UselessOiiaiCat-dmg
          path: dist/UselessOiiaiCat.dmg
          if-no-files-found: error

      - name: Update release DMG
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view latest >/dev/null 2>&1; then
            gh release create latest \
              --title latest \
              --notes "![](https://github.com/${{ github.repository }}/blob/main/assets/oiiai-transparent.gif?raw=true)" \
              --latest
          fi

          gh release upload latest dist/UselessOiiaiCat.dmg --clobber
          gh release edit latest --latest
