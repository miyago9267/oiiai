name: Build DMG

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Swift version
        run: swift --version

      - name: Build DMG
        run: ./oiiai/scripts/build-dmg.sh

      - name: Upload DMG
        uses: actions/upload-artifact@v7
        with:
          name: UselessOiiaiCat-dmg
          path: oiiai/dist/UselessOiiaiCat.dmg
          if-no-files-found: error
